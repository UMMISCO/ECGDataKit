<header class="site-header">
  <div class="header-inner">
    <a href="{{ "/" | relURL }}" class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" fill="none">
          <!-- Parsing: document shape background -->
          <path d="M4,4 L26,4 L32,10 L32,36 L4,36 Z" fill="#f0f7ff" stroke="#d0e2f2" stroke-width="0.8"/>
          <path d="M26,4 L26,10 L32,10" fill="#d0e2f2" stroke="#d0e2f2" stroke-width="0.8" stroke-linejoin="round"/>
          <!-- Bold ECG waveform -->
          <polyline stroke="#1B4F72" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"
            points="1,22 7,22 10,22 12,19 14,26 17,7 20,33 22.5,14 24,22 27,22"/>
          <!-- Bar chart (plotting) -->
          <rect x="28" y="16" width="3" height="8" rx="0.8" fill="#42A5F5"/>
          <rect x="32" y="12" width="3" height="12" rx="0.8" fill="#2196F3"/>
          <rect x="36" y="14" width="3" height="10" rx="0.8" fill="#64B5F6"/>
          <!-- Data points (processing) -->
          <circle cx="29" cy="30" r="1.8" fill="#E91E63"/>
          <circle cx="34" cy="28" r="1.8" fill="#E91E63"/>
          <line x1="29" y1="30" x2="34" y2="28" stroke="#E91E63" stroke-width="1.2"/>
          <!-- Small signal wave (processing) -->
          <polyline stroke="#FF9800" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"
            points="27,35 29,33 31,37 33,32 35,36 37,34"/>
        </svg>
      </div>
      <span class="logo-text"><span class="logo-ecg">ECG</span><span class="logo-dk">DataKit</span></span>
    </a>
    <span class="version-badge">v{{ .Site.Params.version }}</span>
    <nav>
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}" {{ if or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }}class="active"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
    <a href="https://www.ummisco.fr" class="header-lab" aria-label="UMMISCO" target="_blank" rel="noopener">
      <img src="{{ "img/ummisco_logo.png" | relURL }}" alt="UMMISCO" class="header-lab-logo">
    </a>
    <a href="https://github.com/UMMISCO/ECGDataKit" class="header-github" aria-label="GitHub" target="_blank" rel="noopener">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    </a>
    <button class="hamburger" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
  </div>
</header>
