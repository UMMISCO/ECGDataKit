<aside class="sidebar">
  {{ range .Site.Menus.sidebar }}
  {{ if not .Parent }}
  <div class="sidebar-section">
    <h3>{{ .Name }}</h3>
    {{ if .HasChildren }}
    {{ range .Children }}
    <a href="{{ .URL }}" {{ if $.IsMenuCurrent "sidebar" . }}class="active"{{ end }}>{{ .Name }}</a>
    {{ end }}
    {{ end }}
  </div>
  {{ end }}
  {{ end }}
</aside>
<div class="sidebar-overlay" aria-hidden="true"></div>
